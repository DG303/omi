# Self-hosted Omi backend stack. Run from backend/:
#   docker compose -f docker-compose.selfhost.yml up -d --build
#
# Data lives in named volumes inside the Colima VM disk, which itself sits on
# the APFS sparsebundle on the 4TB drive — no host bind mounts for data (qemu
# 9p mounts are slow/flaky on Intel; named volumes land on the drive anyway).

# Bound every container's logs so json-file can't grow unbounded and fill the
# host disk over long uptimes (this box runs for weeks). 10MB x 3 per service.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  qdrant:
    image: qdrant/qdrant:v1.13.4
    restart: unless-stopped
    logging: *default-logging
    ports:
      # Host ports 6335/6336 to avoid colliding with another local service that may
      # already use the default 6333/6334. The backend reaches qdrant internally as
      # qdrant:6333; only host-side consumers use 6335.
      - "6335:6333" # REST — host-side consumers connect on 6335
      - "6336:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  backend:
    image: omi-backend-selfhost:latest
    build:
      context: ..
      dockerfile: backend/Dockerfile.selfhost
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      REDIS_DB_HOST: redis
      REDIS_DB_PORT: "6379"
      HOSTED_PUSHER_API_URL: http://pusher:8080
      # Speaker voiceprint service (CPU ECAPA). Without this, speaker ID is inert:
      # extract_embedding raises and is swallowed, so is_user/person_id never set.
      # See docs/adr/0005. SPEAKER_MATCH_THRESHOLD (ECAPA cutoff) is tuned in .env.
      HOSTED_SPEAKER_EMBEDDING_API_URL: http://speaker-embedding:8080
      # typesense.Client is constructed at import time; dummy values keep boot
      # alive with keyword search disabled (vector search is unaffected)
      TYPESENSE_HOST: typesense.invalid
      TYPESENSE_HOST_PORT: "443"
      TYPESENSE_API_KEY: unused
      # _client.py writes /app/google-credentials.json from SERVICE_ACCOUNT_JSON at
      # startup; .env's GOOGLE_APPLICATION_CREDENTIALS is a host path the container
      # can't see, so override it to where _client.py actually writes the file.
      GOOGLE_APPLICATION_CREDENTIALS: /app/google-credentials.json
    ports:
      - "8080:8080"
    depends_on:
      # Wait for the embedding model to be loaded (service_healthy), not just the
      # container to start — otherwise early speaker-ID calls fail during the
      # multi-second model load. qdrant/redis/pusher only need to be started.
      qdrant:
        condition: service_started
      redis:
        condition: service_started
      pusher:
        condition: service_started
      speaker-embedding:
        condition: service_healthy

  pusher:
    image: omi-backend-selfhost:latest
    build:
      context: ..
      dockerfile: backend/Dockerfile.selfhost
    restart: unless-stopped
    logging: *default-logging
    command:
      [
        "uvicorn",
        "pusher.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
        "--ws-ping-interval",
        "20",
        "--ws-ping-timeout",
        "20",
        "--loop",
        "uvloop",
      ]
    env_file: .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      REDIS_DB_HOST: redis
      REDIS_DB_PORT: "6379"
      # Speaker voiceprint service — pusher extracts speaker samples too. See ADR-0005.
      HOSTED_SPEAKER_EMBEDDING_API_URL: http://speaker-embedding:8080
      TYPESENSE_HOST: typesense.invalid
      TYPESENSE_HOST_PORT: "443"
      TYPESENSE_API_KEY: unused
      GOOGLE_APPLICATION_CREDENTIALS: /app/google-credentials.json
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_started
      speaker-embedding:
        condition: service_healthy

  # CPU-only speaker voiceprint service (SpeechBrain ECAPA). Answers the
  # /v2/embedding contract that utils/stt/speaker_embedding.py POSTs to. The
  # upstream diarizer is GPU/CUDA and unusable on this Intel/Colima box (no
  # NVIDIA GPU); this is the self-hosted CPU replacement. Weights baked into image.
  # See docs/adr/0005.
  speaker-embedding:
    image: omi-speaker-embedding:latest
    build:
      context: ./speaker-embedding
      dockerfile: Dockerfile
    restart: unless-stopped
    logging: *default-logging
    expose:
      - "8080"
    # /health returns 503 until the ECAPA model finishes loading (preloaded at
    # startup), so dependents that wait on service_healthy only start once this
    # can actually answer embedding requests. start_period covers the CPU load.
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health').status == 200 else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 180s

volumes:
  qdrant_data:
  redis_data:

# Self-hosted Omi backend stack (your-host). Run from backend/:
#   docker compose -f docker-compose.selfhost.yml up -d --build
#
# Data lives in named volumes inside the Colima VM disk, which itself sits on
# the APFS sparsebundle on the 4TB drive — no host bind mounts for data (qemu
# 9p mounts are slow/flaky on Intel; named volumes land on the drive anyway).
services:
  qdrant:
    image: qdrant/qdrant:v1.13.4
    restart: unless-stopped
    ports:
      # Host ports 6335/6336 (not 6333/6334) to avoid colliding with the separate
      # another local service RAG qdrant that occupies 6333/6334 on this host. The backend still
      # reaches qdrant internally as qdrant:6333; only host-side consumers (audit
      # scripts, MCP, dashboards) use 6335.
      - "6335:6333" # REST — host-side consumers connect on 6335
      - "6336:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  backend:
    image: omi-backend-selfhost:latest
    build:
      context: ..
      dockerfile: backend/Dockerfile.selfhost
    restart: unless-stopped
    env_file: .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      REDIS_DB_HOST: redis
      REDIS_DB_PORT: "6379"
      HOSTED_PUSHER_API_URL: http://pusher:8080
      # typesense.Client is constructed at import time; dummy values keep boot
      # alive with keyword search disabled (vector search is unaffected)
      TYPESENSE_HOST: typesense.invalid
      TYPESENSE_HOST_PORT: "443"
      TYPESENSE_API_KEY: unused
      # .env's GOOGLE_APPLICATION_CREDENTIALS is a host path the container can't see;
      # override to the in-container mount point (file mounted below).
      GOOGLE_APPLICATION_CREDENTIALS: /app/google-credentials.json
    volumes:
      - ./google-credentials.json:/app/google-credentials.json:ro
    ports:
      - "8080:8080"
    depends_on:
      - qdrant
      - redis
      - pusher

  pusher:
    image: omi-backend-selfhost:latest
    build:
      context: ..
      dockerfile: backend/Dockerfile.selfhost
    restart: unless-stopped
    command:
      [
        "uvicorn",
        "pusher.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
        "--ws-ping-interval",
        "20",
        "--ws-ping-timeout",
        "20",
        "--loop",
        "uvloop",
      ]
    env_file: .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      REDIS_DB_HOST: redis
      REDIS_DB_PORT: "6379"
      TYPESENSE_HOST: typesense.invalid
      TYPESENSE_HOST_PORT: "443"
      TYPESENSE_API_KEY: unused
      GOOGLE_APPLICATION_CREDENTIALS: /app/google-credentials.json
    volumes:
      - ./google-credentials.json:/app/google-credentials.json:ro
    depends_on:
      - qdrant
      - redis

volumes:
  qdrant_data:
  redis_data:
